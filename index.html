<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Home - Calorie App</title>
  <style>
    body { 
      /* Background image only (remove side/bottom images) */
      background: url("{{ url_for('static', filename='images/background.png') }}") no-repeat center center fixed;
      background-size: cover;  /* cover full screen */
      font-family: Arial; 
      color: #fff; 
      text-align: center;
      position: relative;
      min-height: 100vh;
      overflow: hidden;
    }

    .card { 
      margin: 8% auto; 
      padding: 30px; 
      width: 420px; 
      background: rgba(0,0,0,0.35); 
      border-radius: 12px;
      z-index: 1;
      position: relative;
    }

    a.btn { 
      display: inline-block; 
      padding: 12px 22px; 
      background: #ff9800; 
      color: #fff; 
      border-radius: 8px; 
      text-decoration: none; 
      margin: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1> Welcome {{ session['user'] }} </h1>
    <p>Use the prediction page to enter your details.</p>
    <a class="btn" href="/prediction">Go to Prediction</a>
    <a class="btn" href="/logout">Logout</a>
  </div>
</body>
</html>
