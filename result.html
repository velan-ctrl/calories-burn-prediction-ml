<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Result - Calorie App</title>
  <style>
    body { 
      font-family: Arial; 
      color:#fff; 
      text-align:center; 
      min-height: 100vh; 
      margin: 0;
      background: url("{{ url_for('static', filename='images/3300.jpg') }}") no-repeat center center fixed;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .box { 
      margin:8% auto; 
      width:420px; 
      background: rgba(0,0,0,0.35); /* semi-transparent box */
      padding:24px; 
      border-radius:12px;
    }
    .stat { font-size:18px; margin:8px 0; }
    .btn {
      display:inline-block;
      margin:8px 4px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.2);
      color:#fff;
      border-radius:8px;
      text-decoration:none;
      font-weight:bold;
    }
    .btn:hover { background: rgba(255,255,255,0.35); }
  </style>
</head>
<body>
  <div class="box">
    <h2> Prediction Result </h2>
    <div class="stat"><b>Estimated Calories Burnt:</b> {{ calories }} kcal</div>
    <div class="stat"><b>Model Info:</b> {{ accuracy }}</div>

    <a href="/prediction" class="btn">🔙 Back</a>
    <a href="/comparison" class="btn">📊 Compare All Algorithms</a>
  </div>
</body>
</html>
